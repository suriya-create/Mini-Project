<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors Game</title>
    <link rel="stylesheet" href="StonePaperScissorsGame.css">
</head>
<body>

    <div class="container">
        <h1>Stone Paper Scissors</h1>

        <div class="buttons">
            <button onclick="playGame('stone')">🪨 Stone</button>
            <button onclick="playGame('paper')">📄 Paper</button>
            <button onclick="playGame('scissors')">✂️ Scissors</button>
        </div>

        <div class="result">
            <p id="userChoice">Your Choice: -</p>
            <p id="computerChoice">Computer Choice: -</p>
            <h2 id="winner">Choose an option!</h2>
        </div>
    </div>

    <script src="StonePaperScissorsGame.js"></script>

</body>
</html>
