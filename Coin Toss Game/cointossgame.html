<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss Game</title>
    <link rel="stylesheet" href="cointossgame.css">
</head>
<body>

    <div class="container">
        <h1>Toss the Coin</h1>

        <div class="coin" id="coin">
            <div class="side heads">H</div>
            <div class="side tails">T</div>
        </div>

        <button id="tossBtn">Toss Coin</button>

        <p id="result">Click the button to toss the coin!</p>
    </div>

    <script src="cointossgame.js"></script>
</body>
</html>
